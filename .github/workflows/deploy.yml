name: Deploy API to AWS ECR

on:
  push:
    branches: [ main ]  # Triggers the pipeline every time you push to main
jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up a clean Python environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.11'
        cache: 'pip' # Automatically caches pip dependencies to speed up future runs

    # 3. Upgrade pip and install all project dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    # 4. Run fast Code Unit Tests
    - name: Run Code Unit Tests
      env:
        PYTHONPATH: .
        PYTHONNOUSERSITE: "1" # Force Python to completely ignore ~/.local packages
      run: |
        python -m pytest -m unit -v

    # 5. Run Vectorized Data Schema Tests
    - name: Run Data Schema Tests
      run: |
        python -m pytest -m data -v
        
  build-and-push:
    runs-on: ubuntu-latest  # The cloud environment where the build happens

    steps:
    # 1. Pull down a copy of your source code onto the cloud runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Authenticate with AWS using your secure GitHub Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1  # Change to your AWS region if different

    # 3. Log the cloud runner's Docker engine into your ECR registry
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Build the image on the cloud network and push it to AWS
    - name: Build, Tag, and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: machinery-prod  # Your ECR repository name
        IMAGE_TAG: ${{ github.sha }}    # Uses the unique Git Commit hash as the version tag
      run: |
        # Build the image using the cloud runner's high-speed network cache
        # docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker build --progress=plain -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        # Push both the unique version tag and the rolling 'latest' tag
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

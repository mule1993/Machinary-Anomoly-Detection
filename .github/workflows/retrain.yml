name: Scheduled Automated Retraining

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday
  workflow_dispatch:

jobs:
  # --- JOB 1: AUTHENTICATE AND GENERATE TEMPORARY ECR TOKEN ---
  get-token:
    runs-on: ubuntu-latest
    outputs:
      ecr_token: ${{ steps.login-ecr.outputs.password }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

  # --- JOB 2: RUN RETRAINING INSIDE THE SECURED CONTAINER ---
  retrain_model:
    needs: get-token # Wait for Job 1 to finish
    runs-on: ubuntu-latest
    container:
      image: "${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/machinery-anomaly-detection:latest"
      credentials:
        username: "AWS"  # Wrapped in quotes
        password: "${{ needs.get-token.outputs.ecr_token }}" # Wrapped in quotes

    steps:
      - name: Run Complete Pipeline Chain
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python src/simulate_labels.py				# ground truth generating
          python src/evaluate_inference_performance.py		# inference and ground truth joining and current performance evaluating
          python src/models/retraining.py			# inference and ground truth joining, current performance evaluating and retraining
          python src/models/evaluate_models_for_promotion.py	# metric comparing and challenger to production promoting

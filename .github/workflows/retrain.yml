name: Scheduled Automated Retraining

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday
  workflow_dispatch:

jobs:
  retrain_model:
    runs-on: ubuntu-latest

    steps:
      # 1. CRITICAL: Clone the repository so that the ./config directory actually exists on the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Authenticate cleanly with AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3. Log into ECR natively to establish pulling permissions
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

     # 4. Pull and run your processing pipeline directly inside the container
      - name: Pull and Execute Retraining Container
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: "machinery-prod"
          IMAGE_TAG: "latest"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MODEL_NAME: "machinery_failure_anomaly_detector"
          MODEL_ALIAS: "production"
          BUCKET_NAME: "machinery-mlops-muluneh-2026"
          ALIAS1: "challenger"
          TARGET_METRIC: "f1"
          EXPERIMENT_NAME: "machinery-failure.anomaly-detection"
        run: |
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # 1. Start the container in the background (detached mode)
          docker run -d --name retrain_worker \
            --entrypoint sleep \
            -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -e MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI \
            -e EXPERIMENT_NAME=$EXPERIMENT_NAME \
            -e MODEL_NAME=$MODEL_NAME \
            -e MODEL_ALIAS=$MODEL_ALIAS \
            -e BUCKET_NAME=$BUCKET_NAME \
            -e HYDRA_FULL_ERROR=1 \
            -e ALIAS1=$ALIAS1 \
            -e TARGET_METRIC=$TARGET_METRIC \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG 3600
          
          # 2. Inject the config folder using the relative path indicator
          docker cp ./config retrain_worker:/app/config
          
          # 3. Execute the pipeline scripts sequentially
          docker exec retrain_worker bash -c "cd /app && python src/simulate_labels.py && python src/evaluate_inference_performance.py && python src/models/retraining.py && python src/models/evaluate_models_for_promotion.py"
          
          # 4. Clean up the container when done
          docker rm -f retrain_worker
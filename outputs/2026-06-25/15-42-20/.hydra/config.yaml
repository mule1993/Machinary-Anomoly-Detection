data_path: ${oc.env:RAW_DATA_PATH}
experiment_name: ${oc.env:EXPERIMENT_NAME}
model_name: ${oc.env:MODEL_NAME}
alias: ${oc.env:MODEL_ALIAS}
model_description: ${oc.env:MODEL_DESCRIPTION}
model_run_name: ${oc.env:MODEL_RUN_NAME}
target_metric: ${oc.env:TARGET_METRIC}
alias1: ${oc.env:ALIAS1}
mlflow:
  tracking_uri: ${oc.env:MLFLOW_TRACKING_URI, "http://localhost:5000"}
data:
  test_size: 0.2
  random_state: 42
hyperparameters:
  n_estimators: 200
  max_depth: 5
  learning_rate: 0.02
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: logloss
  random_state: 42
  scale_pos_weight: 1

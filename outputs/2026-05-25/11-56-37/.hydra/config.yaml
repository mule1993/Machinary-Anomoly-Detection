experiment_name: ${oc.env:EXPERIMENT_NAME}
model_name: ${oc.env:MODEL_NAME}
alias: ${oc.env:MODEL_ALIAS}
model_description: ${oc.env:MODEL_DESCRIPTION}
model_run_name: ${oc.env:MODEL_RUN_NAME}
data:
  test_size: 0.2
  random_state: 42
hyperparameters:
  n_estimators: 200
  max_depth: 5
  learning_rate: 0.02
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: logloss
  random_state: 42
